<template>
    <lightning-button
        label="Generate Document"
        variant="brand"
        icon-name="utility:file"
        onclick={handleOpenModal}>
    </lightning-button>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true"
                 aria-labelledby="dg-modal-heading"
                 class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container dg-modal-container">

                <!-- ── Header ────────────────────────────────────────── -->
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            aria-label="Close" title="Close" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" size="small"
                                        alternative-text="Close"></lightning-icon>
                    </button>
                    <h2 id="dg-modal-heading" class="slds-modal__title">
                        <lightning-icon icon-name="utility:file" size="small"
                                        class="slds-var-m-right_x-small"></lightning-icon>
                        Generate Document
                    </h2>
                </header>

                <!-- ── Body ─────────────────────────────────────────── -->
                <div class="slds-modal__content slds-var-p-around_medium dg-modal-body slds-is-relative">

                    <!-- SECTION 1 — Record Info ───────────────────── -->
                    <div class="dg-card">
                        <div class="dg-card__header">Record</div>
                        <div class="dg-card__body">
                            <div class="slds-grid slds-grid_vertical slds-wrap">
                                <div class="slds-col slds-size_1-of-1 slds-var-m-bottom_x-small">
                                    <div class="dg-info-label slds-text-color_weak">Object</div>
                                    <span class="dg-info-value">{objectApiName}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-1">
                                    <div class="dg-info-label slds-text-color_weak">Record</div>
                                    <span class="dg-info-value">
                                        <template if:true={recordName}>{recordName}</template>
                                        <template if:false={recordName}>
                                            <span class="dg-muted">{recordId}</span>
                                        </template>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 2 — Template Selection ───────────── -->
                    <div class="dg-card">
                        <div class="dg-card__header">Template</div>
                        <div class="dg-card__body">

                            <template if:false={hasSelectedTemplate}>
                                <div class="dg-search-wrap slds-is-relative">
                                    <lightning-input
                                        label=""
                                        placeholder="Search templates…"
                                        value={templateSearch}
                                        oninput={handleTemplateSearch}
                                        onfocus={handleSearchFocus}
                                        onblur={handleSearchBlur}
                                        onkeydown={handleSearchKeydown}
                                        autocomplete="off"
                                        disabled={isLoading}>
                                    </lightning-input>

                                    <template if:true={showDropdown}>
                                        <div class="dg-dropdown slds-is-absolute" role="listbox">
                                            <template if:true={hasFilteredTemplates}>
                                                <template for:each={filteredTemplates} for:item="tmpl">
                                                    <div key={tmpl.Id}
                                                         class="dg-dropdown-item slds-grid slds-grid_vertical-align-center"
                                                         data-id={tmpl.Id}
                                                         data-name={tmpl.Name}
                                                         role="option"
                                                         onmousedown={handleSelectTemplate}>
                                                        <lightning-icon icon-name="utility:file"
                                                                        size="x-small"
                                                                        class="slds-var-m-right_x-small">
                                                        </lightning-icon>
                                                        <span class="dg-tmpl-name slds-grow">{tmpl.Name}</span>
                                                        <span class="dg-tmpl-obj">{tmpl.Primary_Object__c}</span>
                                                    </div>
                                                </template>
                                            </template>
                                            <template if:false={hasFilteredTemplates}>
                                                <div class="dg-dropdown-empty">
                                                    <template if:true={isLoading}>Loading…</template>
                                                    <template if:false={isLoading}>No templates found</template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>

                                <template if:true={isLoadingConfig}>
                                    <p class="dg-hint">Loading template config…</p>
                                </template>
                            </template>

                            <template if:true={hasSelectedTemplate}>
                                <div class="dg-selected-tmpl slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:file" size="small"
                                                    class="slds-var-m-right_small"></lightning-icon>
                                    <span class="slds-grow dg-selected-tmpl__name">{selectedTemplate.Name}</span>
                                    <button class="slds-button slds-button_icon dg-clear-btn"
                                            aria-label="Change template"
                                            title="Change template"
                                            onclick={handleClearTemplate}>
                                        <lightning-icon icon-name="utility:clear" size="x-small"
                                                        alternative-text="Clear"></lightning-icon>
                                    </button>
                                </div>
                            </template>

                        </div>
                    </div>

                    <!-- Error banner ──────────────────────────────── -->
                    <template if:true={error}>
                        <div class="dg-banner dg-banner--error slds-grid slds-grid_vertical-align-center slds-wrap"
                             role="alert">
                            <lightning-icon icon-name="utility:error" size="x-small" variant="error"
                                            class="slds-var-m-right_x-small"></lightning-icon>
                            {error}
                        </div>
                    </template>

                    <!-- Success banner ─────────────────────────────── -->
                    <template if:true={successMessage}>
                        <div class="dg-banner dg-banner--success slds-grid slds-grid_vertical-align-center slds-wrap"
                             role="status">
                            <lightning-icon icon-name="utility:success" size="x-small" variant="success"
                                            class="slds-var-m-right_x-small"></lightning-icon>
                            <span class="slds-grow">{successMessage}</span>
                            <template if:true={lastGeneratedDocId}>
                                <a href={lastGeneratedFileUrl} target="_blank"
                                   class="slds-var-m-left_small">View File</a>
                            </template>
                        </div>
                    </template>

                    <!-- Generating overlay ─────────────────────────── -->
                    <template if:true={isGenerating}>
                        <div class="dg-overlay slds-is-absolute slds-grid slds-grid_vertical
                                    slds-grid_align-center slds-grid_vertical-align-center">
                            <lightning-spinner alternative-text={generatingMessage}
                                              size="medium"></lightning-spinner>
                            <p class="dg-overlay__text slds-m-around_none">{generatingMessage}</p>
                        </div>
                    </template>

                </div>

                <!-- ── Footer ────────────────────────────────────────── -->
                <footer class="slds-modal__footer">
                    <div class="slds-grid slds-grid_vertical-align-center slds-wrap">
                        <div class="slds-col">
                            <lightning-button
                                label="Cancel"
                                onclick={handleClose}
                                disabled={isGenerating}>
                            </lightning-button>
                        </div>
                        <div class="slds-col_bump-left slds-grid slds-grid_vertical-align-center">
                            <lightning-button
                                label="Open Template"
                                icon-name="utility:preview"
                                onclick={handleOpenTemplate}
                                disabled={isActionDisabled}
                                class="slds-var-m-right_x-small">
                            </lightning-button>
                            <lightning-button
                                label="Download as PDF"
                                variant="neutral"
                                icon-name="utility:download"
                                onclick={handleDownloadPdf}
                                disabled={isActionDisabled}>
                            </lightning-button>
                        </div>
                    </div>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
