<template>
    <div class="wizard-container slds-card slds-p-around_none">
        <div class="slds-card__header slds-grid slds-p-around_medium" style="background:#032D60; border-radius:4px 4px 0 0;">
            <div class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name="utility:file" size="small" style="--sds-c-icon-color-foreground-default:#fff;"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title" style="color:#fff;font-size:1.2rem;">
                        Document Generation Template Builder
                        <template if:true={isEditMode}>
                            <span class="slds-badge slds-badge_lightest slds-m-left_x-small" style="font-size:11px;vertical-align:middle;">Editing Template</span>
                        </template>
                    </h2>
                    <p style="color:#aed6f1;font-size:12px;">Build, map, and generate documents from Salesforce data</p>
                </div>
                <template if:true={isEditMode}>
                    <lightning-button
                        label="Cancel Edit"
                        variant="destructive-text"
                        icon-name="utility:close"
                        onclick={handleReset}
                        style="--sds-c-button-text-color:#f4a261;">
                    </lightning-button>
                </template>
            </div>
        </div>

        <div class="slds-p-around_medium">
            <c-doc-gen-progress-bar
                steps={activeStepLabels}
                current-step={progressStep}>
            </c-doc-gen-progress-bar>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template if:true={isStep0}>
                <c-doc-gen-template-upload
                    onstepcomplete={handleStepComplete}>
                </c-doc-gen-template-upload>
            </template>

            <template if:true={isStep1}>
                <c-doc-gen-object-selector
                    template-tokens={wizardState.templateTokens}
                    saved-primary-object={wizardState.primaryObject}
                    saved-primary-label={wizardState.primaryObjectLabel}
                    saved-parent-objects={wizardState.parentObjects}
                    saved-child-objects={wizardState.childObjects}
                    onstepcomplete={handleStepComplete}
                    onstepback={handleBack}>
                </c-doc-gen-object-selector>
            </template>

            <template if:true={isStep2}>
                <c-doc-gen-mapping-builder
                    template-tokens={wizardState.templateTokens}
                    sys-tokens={wizardState.sysTokens}
                    primary-object={wizardState.primaryObject}
                    parent-objects={wizardState.parentObjects}
                    child-objects={wizardState.childObjects}
                    saved-mappings={wizardState.tokenMappings}
                    onstepcomplete={handleStepComplete}
                    onstepback={handleBack}>
                </c-doc-gen-mapping-builder>
            </template>

            <template if:true={isStep3}>
                <c-doc-gen-variables-panel
                    variable-tokens={wizardState.variableTokens}
                    saved-variables={wizardState.variables}
                    onstepcomplete={handleStepComplete}
                    onstepback={handleBack}>
                </c-doc-gen-variables-panel>
            </template>

            <template if:true={isStep4}>
                <c-doc-gen-preview-download
                    template-config={templateConfig}
                    onstepback={handleBack}>
                </c-doc-gen-preview-download>
            </template>
        </div>

        <div class="slds-p-around_medium slds-border_top" style="text-align:right;">
            <lightning-button
                label="Reset Wizard"
                variant="destructive-text"
                icon-name="utility:refresh"
                onclick={handleReset}>
            </lightning-button>
        </div>
    </div>
</template>
