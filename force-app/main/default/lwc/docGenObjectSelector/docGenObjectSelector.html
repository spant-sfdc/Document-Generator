<template>
    <lightning-card title="Step 2: Select Objects" icon-name="utility:standard_objects">
        <div class="slds-p-around_medium">
            <c-doc-gen-error-panel errors={error}></c-doc-gen-error-panel>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading objects..." size="small"></lightning-spinner>
            </template>

            <!-- Search Input -->
            <div class="slds-form-element slds-m-bottom_small">
                <label class="slds-form-element__label">
                    <abbr class="slds-required" title="required">*</abbr>
                    Search &amp; Select Objects
                </label>
                <div class="slds-form-element__control search-wrapper">
                    <div class="slds-input-has-icon slds-input-has-icon_left">
                        <lightning-icon
                            icon-name="utility:search"
                            size="x-small"
                            class="slds-icon slds-input__icon slds-input__icon_left slds-icon-text-default">
                        </lightning-icon>
                        <input
                            type="text"
                            class="slds-input search-input"
                            placeholder={searchPlaceholder}
                            oninput={handleSearchInput}
                            onblur={handleSearchBlur}
                            autocomplete="off" />
                    </div>

                    <!-- Suggestions dropdown -->
                    <template if:true={showSuggestions}>
                        <div class="suggestions-dropdown">
                            <template for:each={suggestions} for:item="obj">
                                <div
                                    key={obj.apiName}
                                    class="suggestion-item"
                                    data-api-name={obj.apiName}
                                    data-label={obj.label}
                                    onmousedown={handleSelectSuggestion}>
                                    <span class="obj-label">{obj.label}</span>
                                    <span class="obj-api">{obj.apiName}</span>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Mode Toggle — visible after primary is set -->
            <template if:true={showModeToggle}>
                <div class="mode-toggle slds-m-bottom_medium">
                    <span class="mode-label">Adding next object as:</span>
                    <button class={parentModeClass} onclick={handleSetModeParent}>
                        ↑ Parent Object
                    </button>
                    <button class={childModeClass} onclick={handleSetModeChild}>
                        ↓ Child Object
                    </button>
                </div>
            </template>

            <!-- Primary Object Chip -->
            <template if:true={primaryObject}>
                <div class="slds-m-bottom_small">
                    <p class="section-label" style="color:#032D60;">Primary Object</p>
                    <div class="chip chip-primary">
                        <lightning-icon icon-name="utility:record" size="xx-small" class="chip-icon"></lightning-icon>
                        <span class="chip-label">{primaryLabel}</span>
                        <span class="chip-api">({primaryObject})</span>
                        <button class="chip-remove" onclick={handleRemovePrimary} title="Remove">&#x2715;</button>
                    </div>
                </div>
            </template>

            <!-- Parent Object Chips -->
            <template if:true={hasParents}>
                <div class="slds-m-bottom_small">
                    <p class="section-label" style="color:#1b5e20;">
                        Parent Objects
                        <span class="section-hint">— single related record, accessed via lookup from primary</span>
                    </p>
                    <div class="chips-row">
                        <template for:each={parentObjects} for:item="rel">
                            <div key={rel.apiName} class="chip chip-parent-obj">
                                <lightning-icon icon-name="utility:record_lookup" size="xx-small" class="chip-icon"></lightning-icon>
                                <span class="chip-label">{rel.label}</span>
                                <span class="chip-api">({rel.apiName})</span>
                                <button
                                    class="chip-remove"
                                    data-api-name={rel.apiName}
                                    onclick={handleRemoveParent}
                                    title="Remove">&#x2715;</button>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Child Object Chips -->
            <template if:true={hasChildren}>
                <div class="slds-m-bottom_small">
                    <p class="section-label" style="color:#c75300;">
                        Child Objects
                        <span class="section-hint">— multiple records, require a repeating section in template</span>
                    </p>
                    <div class="chips-row">
                        <template for:each={childObjects} for:item="rel">
                            <div key={rel.apiName} class="chip chip-child">
                                <lightning-icon icon-name="utility:list" size="xx-small" class="chip-icon"></lightning-icon>
                                <span class="chip-label">{rel.label}</span>
                                <span class="chip-api">({rel.apiName})</span>
                                <button
                                    class="chip-remove"
                                    data-api-name={rel.apiName}
                                    onclick={handleRemoveChild}
                                    title="Remove">&#x2715;</button>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Child Warning -->
            <template if:true={childWarning}>
                <div class="child-warning slds-m-bottom_small">
                    <lightning-icon icon-name="utility:warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    {childWarning}
                </div>
            </template>

            <div class="slds-grid slds-grid_align-spread slds-m-top_medium">
                <lightning-button label="Back" onclick={handleBack}></lightning-button>
                <lightning-button
                    label="Next: Map Tokens"
                    variant="brand"
                    onclick={handleNext}
                    disabled={isNextDisabled}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
